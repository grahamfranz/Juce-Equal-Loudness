name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # JUCE's juceaide helper is built unconditionally during configure
          # and pulls in the full juce_gui_basics dependency set, regardless
          # of which JUCE modules our own targets actually use. So we need
          # the X11 / OpenGL / fontconfig / GTK / webkit stack just to get
          # past CMake configure, not because our module needs any of them.
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libwebkit2gtk-4.1-dev

      - name: Clone JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Configure
        run: cmake -B build -DJUCE_PATH=${{ github.workspace }}/JUCE -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --build-config Release
